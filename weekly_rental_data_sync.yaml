name: Weekly Rental Data Sync

on:
  schedule:
    - cron: '0 0 * * 3' # Runs every Wednesday at midnight
  workflow_dispatch:

jobs:
  scrape_rentcast:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install requests pandas

      - name: Run RentCast Script
        env:
          RENTCAST_API_KEY: ${{ secrets.RENTCAST_API_KEY }}
        run: python rent_tracker.py

      - name: Save to Repo
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add rent_history.csv
          git commit -m "Update rental data: $(date +'%Y-%m-%d')" || exit 0
          git push